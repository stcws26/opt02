<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B0C0E"/>
      <stop offset="0.55" stop-color="#101418"/>
      <stop offset="1" stop-color="#0D2A20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.62" cy="0.55" r="0.55">
      <stop offset="0" stop-color="#F2790C" stop-opacity="0.85"/>
      <stop offset="0.35" stop-color="#F2790C" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#F2790C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- distant building crane silhouettes -->
  <g fill="#12171B" opacity="0.9">
    <rect x="60" y="360" width="26" height="420"/>
    <rect x="10" y="350" width="130" height="14"/>
    <rect x="95" y="350" width="10" height="80"/>
    <rect x="1450" y="300" width="24" height="480"/>
    <rect x="1350" y="292" width="180" height="12"/>
  </g>

  <!-- industrial building block silhouette -->
  <g fill="#141A1E">
    <rect x="150" y="470" width="420" height="330"/>
    <rect x="600" y="360" width="260" height="440"/>
    <rect x="890" y="430" width="340" height="370"/>
    <rect x="1260" y="500" width="220" height="300"/>
  </g>
  <!-- building window grid, faint green glow -->
  <g fill="#1C8F5E" opacity="0.35">
    <rect x="170" y="500" width="22" height="30"/>
    <rect x="210" y="500" width="22" height="30"/>
    <rect x="250" y="500" width="22" height="30"/>
    <rect x="170" y="560" width="22" height="30"/>
    <rect x="210" y="560" width="22" height="30"/>
    <rect x="250" y="560" width="22" height="30"/>
    <rect x="630" y="400" width="24" height="34"/>
    <rect x="675" y="400" width="24" height="34"/>
    <rect x="630" y="460" width="24" height="34"/>
    <rect x="675" y="460" width="24" height="34"/>
    <rect x="920" y="470" width="24" height="34"/>
    <rect x="965" y="470" width="24" height="34"/>
    <rect x="1010" y="470" width="24" height="34"/>
  </g>

  <!-- steel beam scaffolding foreground -->
  <g stroke="#05060A" stroke-width="10" opacity="0.95">
    <line x1="700" y1="900" x2="700" y2="520"/>
    <line x1="900" y1="900" x2="900" y2="480"/>
    <line x1="700" y1="620" x2="900" y2="560"/>
    <line x1="700" y1="740" x2="900" y2="680"/>
  </g>

  <!-- welder silhouette -->
  <g transform="translate(760,560)">
    <path d="M0 0 C -6 -18 -2 -36 10 -42 C 24 -48 34 -34 30 -18 C 40 -10 44 6 34 16 L 34 60 L -6 60 L -6 20 C -18 16 -18 -2 0 0 Z" fill="#05060A"/>
    <rect x="24" y="-46" width="16" height="10" rx="2" fill="#05060A"/>
  </g>

  <!-- welding arc + sparks (focal point) -->
  <g transform="translate(792,520)">
    <circle r="10" fill="#FFFFFF"/>
    <circle r="22" fill="#F2790C" opacity="0.55"/>
    <circle r="40" fill="#F2790C" opacity="0.22"/>
    <g fill="#F2790C">
      <circle cx="34" cy="-18" r="3"/>
      <circle cx="52" cy="4" r="2.2"/>
      <circle cx="20" cy="-38" r="2"/>
      <circle cx="-24" cy="-30" r="2.4"/>
      <circle cx="-42" cy="6" r="2"/>
      <circle cx="8" cy="42" r="2.4"/>
      <circle cx="46" cy="26" r="1.8"/>
      <circle cx="-30" cy="34" r="1.6"/>
    </g>
  </g>

  <!-- ground line -->
  <rect x="0" y="800" width="1600" height="100" fill="#08090B"/>
</svg>
