<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 96" width="340" height="96" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">SoleTrade Welding</title>
  <defs>
    <linearGradient id="plateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1D1F"/>
      <stop offset="1" stop-color="#0B0C0E"/>
    </linearGradient>
  </defs>

  <!-- Steel plate badge -->
  <polygon points="48,4 84,26 84,70 48,92 12,70 12,26" fill="url(#plateGrad)" stroke="#F2790C" stroke-width="2.5"/>
  <!-- rivets -->
  <circle cx="48" cy="12" r="2.4" fill="#F2790C"/>
  <circle cx="18" cy="30" r="2.4" fill="#F2790C"/>
  <circle cx="78" cy="30" r="2.4" fill="#F2790C"/>
  <circle cx="18" cy="66" r="2.4" fill="#F2790C"/>
  <circle cx="78" cy="66" r="2.4" fill="#F2790C"/>
  <circle cx="48" cy="84" r="2.4" fill="#F2790C"/>

  <!-- welding arc / spark mark -->
  <g>
    <path d="M30 60 L44 40 L40 40 L54 22" fill="none" stroke="#146B47" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 60 L44 40 L40 40 L54 22" fill="none" stroke="#1C8F5E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#F2790C">
      <circle cx="55" cy="20" r="2.6"/>
      <circle cx="61" cy="24" r="1.6"/>
      <circle cx="58" cy="15" r="1.4"/>
      <circle cx="49" cy="27" r="1.3"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="102" y="46" font-family="'Oswald','Arial Narrow',sans-serif" font-weight="600" font-size="30" letter-spacing="1" fill="#0B0C0E">SOLETRADE</text>
  <text x="103" y="70" font-family="'Oswald','Arial Narrow',sans-serif" font-weight="500" font-size="19" letter-spacing="7" fill="#F2790C">WELDING</text>
  <rect x="103" y="76" width="176" height="3" fill="#146B47"/>
</svg>
